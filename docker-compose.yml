services:
  db:
    image: postgres:16
    container_name: voocab_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voocab_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - db
    ports:
      - "8000:8000"
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: voocab_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./bot:/app
    depends_on:
      - db
    command: >
      sh -c "python -u /app/main.py"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voocab_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true


volumes:
  postgres_data:
      
